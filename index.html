<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Browse</title>
    <style>
        * { margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #111; }
        #search-bar {
            position: fixed; top: 10px; left: 50%;
            transform: translateX(-50%); z-index: 9999;
            padding: 10px; background: rgba(0,0,0,0.8);
            border-radius: 10px; display: flex; gap: 5px;
        }
        #url-input {
            width: 400px; padding: 10px; font-size: 16px;
            border: none; border-radius: 5px; background: #222; color: white;
        }
        #go-btn {
            padding: 10px 20px; font-size: 16px; border: none;
            background: #4CAF50; color: white;
            border-radius: 5px; cursor: pointer;
        }
        #uv-frame { width: 100vw; height: 100vh; border: none; margin-top: 50px; }
    </style>
</head>
<body>
    <div id="search-bar">
        <input type="text" id="url-input" placeholder="Enter URL (e.g. google.com)" />
        <button id="go-btn">Go</button>
    </div>
    <iframe id="uv-frame"></iframe>

    <script src="uv/uv.bundle.js"></script>
    <script src="uv/uv.config.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('uv/uv.sw.js', {
                scope: __uv$config.prefix
            });
        }

        const frame = document.getElementById('uv-frame');
        const input = document.getElementById('url-input');
        const btn = document.getElementById('go-btn');

        function go() {
            let url = input.value.trim();
            if (!url) return;
            if (!url.match(/^https?:\/\//)) url = 'https://' + url;
            frame.src = __uv$config.prefix + __uv$config.encodeUrl(url);
        }

        btn.addEventListener('click', go);
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') go();
        });
    </script>
</body>
</html>
